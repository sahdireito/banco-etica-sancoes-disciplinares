<script>
const QUESTOES = [
  {num:1, exame:"XLVI Exame — 2026", titulo:"Colaboração Premiada Contra Cliente — Vedação Absoluta (Art. 7º, §6º-I EOAB)", enunciado:"O advogado Toledo atua na defesa de Tício, investigado por crimes de corrupção e lavagem de dinheiro. Durante as investigações, o próprio Toledo passou a ser investigado por suposta participação em atos ilícitos praticados por seu cliente. Em troca de benefícios penais, o Ministério Público ofereceu a possibilidade de firmar acordo de colaboração premiada ao advogado, desde que ele fornecesse informações sobre Tício e outros envolvidos.", comando:"Com base no Estatuto da OAB, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "O advogado pode colaborar contra seu cliente se a colaboração resultar apenas em redução de pena, sendo vedada a extinção total da punibilidade em razão de delação premiada.", "B": "O advogado não pode celebrar colaboração premiada contra o cliente atual, mas poderá fazê-lo em relação a um ex-cliente, desde que não mais exista vínculo profissional formal entre ambos.", "C": "O advogado poderá firmar colaboração premiada em face de seu cliente, desde que o acordo seja autorizado judicialmente, hipótese em que ficará isento de punição administrativa perante o Tribunal de Ética e Disciplina.", "D": "O advogado não pode efetuar colaboração premiada contra quem seja ou tenha sido seu cliente, e a inobservância dessa regra poderá acarretar processo disciplinar com aplicação de uma sanção de exclusão dos quadros da OAB, sem prejuízo da responsabilização penal."}, fb:{"A": "Incorreta. A vedação é ABSOLUTA — não importa o tipo de benefício penal (redução de pena, extinção da punibilidade, perdão judicial). A colaboração premiada contra cliente é vedada em qualquer circunstância.", "B": "Incorreta. A proibição alcança CLIENTE ATUAL E EX-CLIENTE. O encerramento da relação profissional não extingue o dever de lealdade e sigilo. A banca coloca essa pegadinha em quase todo exame.", "C": "Incorreta. A autorização judicial não afasta a infração disciplinar. A vedação é legal (art. 7º, §6º-I EOAB) e não pode ser afastada nem pelo juiz.", "D": "Correta! Art. 7º, §6º-I EOAB (incluído pela Lei 14.365/2022): é vedado ao advogado efetuar colaboração premiada contra quem seja ou tenha sido seu cliente. Consequências: (1) processo disciplinar na OAB; (2) possibilidade de EXCLUSÃO (art. 35 EOAB); (3) responsabilização penal (violação de segredo profissional)."}, fund:"Art. 7º, §6º-I EOAB (Lei 14.365/2022): vedada colaboração premiada contra cliente atual ou ex-cliente. Art. 35 EOAB: exclusão como sanção possível. A vedação é absoluta — não admite exceções por autorização judicial, tipo de benefício ou encerramento do vínculo.", caqui:"Pensa no advogado como o cofre dos segredos do cliente. Esse cofre não abre nem que o MP ofereça redução de pena, nem que o juiz autorize, nem que o cliente tenha ido embora há anos. A Lei 14.365/2022 fechou essa porta definitivamente. Três pegadinhas que a FGV usa: (1) 'só redução de pena, não extinção' = não importa o tipo de benefício, tudo é vedado. (2) 'ex-cliente pode' = não pode. (3) 'com autorização judicial pode' = não pode. Colaboração premiada contra cliente = vedação absoluta."},
  {num:2, exame:"XLVI Exame — 2026", titulo:"Pena de Censura — Circunstâncias Atenuantes e Publicidade", enunciado:"Mateus, advogado regularmente inscrito na OAB, contratou Marcos, profissional da área de vendas, para abordar pessoas nas imediações da agência do INSS, visando à captação de causas previdenciárias. Foi acertado que Marcos teria participação nos honorários advocatícios das causas que conseguisse agenciar. Constatados os fatos e após o devido processo disciplinar, o Tribunal de Ética e Disciplina aplicou a pena de censura a Mateus.", comando:"Considerando o Estatuto da Advocacia e da OAB, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Havendo circunstâncias atenuantes, será possível substituir a sanção de censura pela aplicação isolada de multa.", "B": "Transitada em julgado a decisão, a sanção aplicada a Mateus deverá constar dos seus assentamentos, dando-se ampla publicidade nos meios oficiais.", "C": "A gravidade da conduta infracional de Mateus não permite a conversão da pena de censura em advertência, ainda que verificada a ausência de punição disciplinar anterior.", "D": "A circunstância de Mateus exercer de modo assíduo e proficiente mandato em cargo ou qualquer órgão da OAB, caso comprovada, deverá ser considerada pelo Tribunal na aplicação da sanção disciplinar."}, fb:{"A": "Incorreta. A multa não substitui a censura. Art. 37 EOAB: as sanções são censura, suspensão, exclusão e multa. A multa pode ser CUMULADA com suspensão ou censura, mas não aplicada isoladamente em substituição à censura.", "B": "Incorreta. Processo disciplinar da OAB tem caráter SIGILOSO — não há ampla publicidade. A censura consta dos assentamentos, mas não recebe divulgação pública nos meios oficiais.", "C": "Incorreta. Art. 36, parágrafo único EOAB: a censura PODE ser convertida em advertência, em ofício reservado e SEM REGISTRO nos assentamentos, quando presentes circunstâncias atenuantes. Ausência de punição anterior é atenuante.", "D": "Correta! Art. 40 EOAB: são circunstâncias atenuantes, entre outras, o exercício assíduo e proficiente de mandato ou cargo em qualquer órgão da OAB. Presente a atenuante, deve ser considerada pelo Tribunal."}, fund:"Art. 37 EOAB: sanções disciplinares (censura, suspensão, exclusão, multa). Art. 36, §único EOAB: censura pode ser convertida em advertência com atenuante. Art. 40 EOAB: circunstâncias atenuantes — ausência de punição anterior, exercício assíduo de mandato na OAB, relevantes serviços à advocacia. Processo disciplinar: caráter sigiloso.", caqui:"Quatro armadilhas nessa questão: (1) 'Multa substitui censura' — não substitui, pode cumular. (2) 'Censura tem ampla publicidade' — processo disciplinar OAB é sigiloso. (3) 'Censura nunca vira advertência' — pode virar, com atenuante! Art. 36 §único é expresso. (4) 'Mandato na OAB é atenuante' — sim, está no art. 40. A mais cobrada: censura COM atenuante PODE ser convertida em advertência (ofício reservado, sem registro). Nunca na direção inversa: advertência não pode virar censura."},
  {num:3, exame:"XLV Exame — 2025", titulo:"Diploma Falso para Inscrição na OAB — Exclusão com Quórum de 2/3", enunciado:"O jovem Marcos foi contratado como auxiliar de escritório por renomada banca de advocacia. Embora nunca tenha cursado Direito, apresentou diploma falso de bacharel para se inscrever no Exame da OAB e, posteriormente, utilizou o mesmo documento para obter sua inscrição como advogado. Seis anos depois, uma denúncia anônima levou à instauração de processo administrativo disciplinar.", comando:"Considerando o Estatuto da Advocacia e da OAB, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "A gravidade da conduta atribuída a Marcos atrai a competência do Conselho Federal da OAB para apurar e punir a infração disciplinar.", "B": "Para a aplicação da sanção correspondente prevista em lei é necessária a manifestação de dois terços dos membros do Conselho Seccional competente.", "C": "A sanção disciplinar prevista para a conduta de Marcos é a de suspensão, que deve perdurar até que seja apresentado documento idôneo, cumulada com a aplicação de multa.", "D": "A pretensão punitiva da infração disciplinar encontra-se prescrita, pois transcorreu o prazo de cinco anos contado da última utilização do documento falso."}, fb:{"A": "Incorreta. A competência para processar e julgar infrações disciplinares é, em regra, do CONSELHO SECCIONAL — não do Conselho Federal. O Conselho Federal julga membros em situações específicas.", "B": "Correta! Documento falso para obtenção de inscrição na OAB = infração gravíssima = pena de EXCLUSÃO. Art. 38, parágrafo único EOAB: a exclusão somente pode ser aplicada com voto favorável de 2/3 dos membros do Conselho Seccional.", "C": "Incorreta. A sanção NÃO é suspensão. A conduta de obter inscrição mediante documento falso sujeita o infrator à pena de EXCLUSÃO — a mais grave no sistema disciplinar da OAB.", "D": "Incorreta. Quando a infração também constitui crime (uso de documento falso = crime), os prazos de prescrição disciplinar seguem os prazos da lei penal (art. 43, §2º EOAB), que são mais longos. Não se aplica automaticamente o prazo disciplinar de 5 anos."}, fund:"Art. 38, §único EOAB: exclusão somente com voto de 2/3 dos membros do Conselho Seccional. Art. 43, §2º EOAB: quando o fato também for crime, a prescrição disciplinar segue os prazos penais. Pena para obtenção de inscrição por documento falso = exclusão.", caqui:"Três fatos para memorizar sobre a exclusão: (1) QUÓRUM = 2/3 do Conselho Seccional (não maioria absoluta, não unanimidade). (2) COMPETÊNCIA = Conselho Seccional (não Federal). (3) PRESCRIÇÃO = se o fato é crime, segue o prazo penal (mais longo que os 5 anos disciplinares). A FGV adorou misturar 'suspensão' onde a resposta correta é 'exclusão'. Memorize: documento falso para entrar na OAB = exclusão + quórum de 2/3."},
  {num:4, exame:"XLV Exame — 2025", titulo:"Atos Privativos Praticados por Não Inscrito e por Suspenso — Nulidade", enunciado:"Helena concluiu mestrado em Administração Pública e adquiriu amplo conhecimento jurídico, mas não possui graduação em Direito nem inscrição na OAB. Ainda assim, passou a prestar consultoria jurídica e a representar clientes em audiências. André, por sua vez, era advogado regularmente inscrito na OAB, mas foi suspenso em razão de infração disciplinar. Apesar da suspensão, continuou a peticionar e a participar de audiências.", comando:"Com base nessas situações, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "Os atos praticados por André, após a sua suspensão da OAB, são nulos, pois ele está impedido de exercer a advocacia enquanto durar a suspensão.", "B": "Os atos privativos da advocacia praticados por Helena são válidos, desde que seus clientes os autorizem expressamente.", "C": "Os atos praticados por Helena são válidos, desde que restritos à consultoria extrajudicial relacionada à Administração Pública.", "D": "Tanto os atos praticados por Helena quanto os atos praticados por André são anuláveis, mas passíveis de convalidação."}, fb:{"A": "Correta! Art. 4º EOAB: são nulos os atos privativos de advogado praticados por pessoa não inscrita na OAB, sem prejuízo das sanções civis, penais e administrativas. O mesmo vale para advogado suspenso, impedido ou licenciado. André está suspenso = seus atos são NULOS.", "B": "Incorreta. A autorização do cliente NÃO convalida o exercício ilegal da advocacia. Os atos praticados por quem não pode advogar são nulos por lei — não há ratificação possível pelo cliente.", "C": "Incorreta. Consultoria e assessoria jurídicas são atividades PRIVATIVAS da advocacia (art. 1º, II EOAB). Helena não pode exercê-las sem inscrição na OAB, independentemente da sua área de conhecimento ou restrição de matéria.", "D": "Incorreta. Os atos não são 'anuláveis passíveis de convalidação' — são NULOS (nulidade absoluta). A lei é expressa: 'são nulos os atos'. Nulidade ≠ anulabilidade."}, fund:"Art. 1º, II EOAB: consultoria e assessoria jurídicas são atividades privativas. Art. 4º EOAB: atos privativos praticados por não inscrito, suspenso, impedido ou licenciado = NULOS, sem possibilidade de ratificação. A autorização do cliente não cura a nulidade.", caqui:"Quem não pode advogar e advoga = ato NULO (não anulável). Diferença crucial: ato NULO não se convalida, não precisa de ação para ser desconstituído, não produz efeitos válidos. Ato ANULÁVEL pode ser confirmado pelas partes. A FGV usa 'anuláveis mas passíveis de convalidação' justamente para testar essa distinção. Art. 4º é categórico: NULOS. E a autorização do cliente não serve de nada — você pode autorizar o médico errado a te operar, mas a operação continua sendo ilegal."},
  {num:5, exame:"XLIV Exame — 2025", titulo:"Advogar Contra Literal Disposição de Lei — Presunção de Boa-Fé (Art. 34, VI EOAB)", enunciado:"Antônia, advogada atuante na área previdenciária, foi consultada por Osvaldo sobre a possibilidade de ajuizar ação contra decisão do INSS que indeferiu benefício previdenciário. Ao analisar o caso, Antônia verificou que o indeferimento baseava-se em dispositivo legal claro e expresso, não havia precedente judicial favorável, e informou claramente ao cliente os riscos da demanda. Mesmo assim, diante da insistência de Osvaldo, Antônia ajuizou a ação.", comando:"Considerando o regime das infrações e sanções disciplinares da advocacia, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Antônia advogou contra literal disposição de lei, o que, embora irrelevante disciplinarmente, poderá sujeitá-la apenas à litigância de má-fé.", "B": "Antônia advogou contra literal disposição de lei, conduta punível com pena isolada de multa.", "C": "Antônia advogou contra literal disposição de lei, porém poderá contar com a presunção de boa-fé caso tenha fundamentado seu pedido na inconstitucionalidade ou na injustiça da lei.", "D": "Antônia advogou contra literal disposição de lei, mas a conduta não possui relevância disciplinar porque a defesa deve ser a mais ampla possível."}, fb:{"A": "Incorreta. Advogar contra literal disposição de lei NÃO é irrelevante disciplinarmente. É infração expressa no art. 34, VI EOAB. A litigância de má-fé é sanção processual — independente da sanção disciplinar.", "B": "Incorreta. Multa isolada não é a sanção prevista para essa infração. E o art. 34, VI prevê uma ressalva importantíssima que afasta a infração em certas hipóteses.", "C": "Correta! Art. 34, VI EOAB: 'advogar contra literal disposição de lei, presumindo-se a boa-fé quando fundamentado na inconstitucionalidade, na injustiça da lei ou em pronunciamento judicial anterior.' Se Antônia argumentou a inconstitucionalidade ou injustiça da lei, presume-se sua boa-fé e afasta-se a infração disciplinar.", "D": "Incorreta. A amplitude da defesa não é salvo-conduto para qualquer conduta. A defesa ampla respeita os limites éticos do Estatuto. Advogar contra literal disposição de lei continua sendo infração, salvo as exceções do art. 34, VI."}, fund:"Art. 34, VI EOAB: advogar contra literal disposição de lei = infração disciplinar, SALVO quando fundamentado na inconstitucionalidade, na injustiça da lei ou em pronunciamento judicial anterior — hipóteses em que se PRESUME A BOA-FÉ do advogado.", caqui:"Esse artigo tem dois lados: a REGRA (advogar contra a lei = infração) e a EXCEÇÃO (presume-se boa-fé se fundamentou em inconstitucionalidade, injustiça ou precedente). A FGV ama cobrar a exceção. O advogado não é servo da lei positivada: se ele acredita que a lei é inconstitucional ou injusta, pode argumentar isso — e aí presume-se boa-fé. Antônia pode usar exatamente esse argumento. Mnemônico: IIP = Inconstitucionalidade, Injustiça, Pronunciamento judicial anterior = presunção de boa-fé."},
  {num:6, exame:"XLIII Exame — 2025", titulo:"Deturpar Citação com IA — Censura (Art. 34, XIV EOAB)", enunciado:"Antônio, advogado experiente, passou a utilizar ferramentas de inteligência artificial generativa para auxiliá-lo na elaboração de peças processuais. Apesar de revisar posteriormente os textos produzidos, determinado magistrado o intimou para prestar esclarecimentos acerca de recurso manifestamente incabível. Ao analisar a peça, Antônio verificou que haviam sido deturpadas citações de doutrina e de jurisprudência, em situação apta a confundir a parte adversa ou induzir o juiz a erro.", comando:"De acordo com o Estatuto da Advocacia, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Por não ter agido dolosamente, Antônio não poderá sofrer sanção disciplinar, pois o advogado não responde por atos culposos.", "B": "Em razão da gravidade da situação, Antônio poderá ser punido com suspensão do exercício profissional por período de 30 dias a 12 meses.", "C": "A Antônio poderá ser aplicada a pena de censura, a qual poderá ser convertida em advertência, em ofício reservado e sem registro nos assentamentos, quando presente circunstância atenuante.", "D": "Em caso de reincidência, Antônio poderá ser punido com exclusão da OAB, com cancelamento de sua inscrição."}, fb:{"A": "Incorreta. A responsabilidade disciplinar não exige dolo — decorre da prática da conduta tipificada. A revisão deficiente das peças geradas por IA é responsabilidade do advogado. O uso da IA não é escudo contra a responsabilidade profissional.", "B": "Incorreta. A sanção cabível para o art. 34, XIV EOAB (deturpar lei/doutrina/jurisprudência) NÃO é suspensão — é CENSURA (art. 36 EOAB). Suspensão se aplica a outras infrações mais graves.", "C": "Correta! Art. 34, XIV EOAB: deturpar o teor de dispositivo de lei, citação doutrinária ou de julgado para confundir o adversário ou iludir o juiz = infração. Pena: CENSURA (art. 36). Com atenuante: pode ser convertida em ADVERTÊNCIA (ofício reservado, sem registro nos assentamentos) — art. 36, §único EOAB.", "D": "Incorreta. Reincidência nessa infração não gera exclusão automaticamente. A exclusão é aplicada nas hipóteses específicas do Estatuto (3 suspensões, documento falso, etc.)."}, fund:"Art. 34, XIV EOAB: deturpar lei/doutrina/julgado para confundir o adversário ou iludir o juiz = infração. Art. 36 EOAB: pena = censura. Art. 36, §único: com atenuante = conversão em advertência (ofício reservado, sem registro). O uso de IA não exclui a responsabilidade disciplinar do advogado.", caqui:"A FGV usou a IA como contexto moderno para testar uma infração clássica: deturpar citações para enganar o juiz. A tecnologia usada é irrelevante — o advogado responde pelo conteúdo da peça que assina. Pena = CENSURA. Com atenuante = vira ADVERTÊNCIA (ofício reservado, sem registro). Diferença crucial entre as duas: CENSURA fica nos assentamentos (com publicidade interna). ADVERTÊNCIA = ofício reservado + sem registro. A reincidência não gera exclusão automaticamente — a FGV tentou confundir com a regra das 3 suspensões."},
  {num:7, exame:"XLIII Exame — 2025", titulo:"Processo Disciplinar — Ampla Defesa Obrigatória em Qualquer Grau de Gravidade", enunciado:"Paulo Afrânio foi representado perante o Tribunal de Ética e Disciplina do Conselho Seccional pela suposta prática da infração disciplinar de violação, sem justa causa, do sigilo profissional. O Presidente designou relator para instruir o processo e apresentar parecer preliminar. Por entender que se tratava de infração de menor gravidade, o relator dispensou a defesa prévia, dispensou as razões finais e assegurou apenas defesa oral. Ao final, apresentou parecer pela aplicação da pena de censura, que foi acolhido pelo Tribunal.", comando:"Considerando o processo disciplinar da OAB, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "O procedimento foi correto, pois a defesa oral substitui a defesa prévia e as razões finais.", "B": "Nos casos de parecer pela aplicação de censura, o Presidente do Conselho Seccional pode homologar diretamente o parecer.", "C": "A condução do processo foi ilegal, pois a gravidade da infração ou da sanção não autoriza a supressão de fases do processo disciplinar nem a redução das oportunidades de defesa.", "D": "Não houve violação da ampla defesa, pois a pena aplicada foi apenas de censura."}, fb:{"A": "Incorreta. A defesa oral NÃO substitui a defesa prévia nem as razões finais. São fases distintas com finalidades próprias. A supressão de qualquer fase viola o devido processo legal.", "B": "Incorreta. O Presidente do Conselho Seccional não pode homologar sozinho o parecer — o julgamento compete ao órgão COLEGIADO (Tribunal de Ética e Disciplina).", "C": "Correta! O processo disciplinar da OAB deve respeitar integralmente o contraditório e a ampla defesa (CF art. 5º, LV), independentemente da gravidade da infração ou da sanção aplicada. Não existe 'rito simplificado' por menor gravidade. A supressão de defesa prévia e razões finais torna o processo ILEGAL.", "D": "Incorreta. A nulidade do processo decorre da supressão das fases de defesa — não é afastada pelo fato de a pena ser apenas censura. A gravidade da sanção é irrelevante para a exigência do contraditório."}, fund:"CF art. 5º, LV: ampla defesa e contraditório em processos administrativos. EOAB e Regulamento Geral: processo disciplinar deve assegurar defesa prévia, produção de provas e razões finais. Não existe simplificação por menor gravidade da infração ou da sanção.", caqui:"'A infração é leve, então posso cortar fases do processo.' NUNCA. No processo disciplinar da OAB não existe rito simplificado baseado em gravidade. É como no processo penal: mesmo para crime simples, você tem direito a todas as garantias processuais. Ampla defesa e contraditório valem para censura, suspensão e exclusão igualmente. O relator não tem poder de criar um 'atalho' porque achou a infração pequena. Resultado: processo ilegal, nulo."},
  {num:8, exame:"XLI Exame — 2024", titulo:"Reabilitação Disciplinar — Dependência da Reabilitação Criminal", enunciado:"O Conselho Seccional da OAB aplicou ao advogado Daniel a pena de suspensão por seis meses pela prática da infração prevista no art. 34, XXX, do Estatuto da Advocacia (praticar assédio moral, sexual ou discriminação). Os mesmos fatos deram origem à ação penal, na qual Daniel foi condenado à pena de 1 ano de detenção, substituída por pena restritiva de direitos. A sanção disciplinar foi integralmente cumprida há mais de um ano. Entretanto, a execução da pena criminal ainda está em curso.", comando:"Considerando o instituto da reabilitação disciplinar, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Daniel pode requerer a reabilitação, pois decorreu mais de um ano do cumprimento da sanção disciplinar, sendo esse um direito subjetivo.", "B": "Embora tenha decorrido mais de um ano do cumprimento da sanção disciplinar, Daniel ainda não faz jus à reabilitação disciplinar, ainda que demonstre bom comportamento, pois ela depende também da correspondente reabilitação criminal.", "C": "Havendo provas de bom comportamento, Daniel fará jus à reabilitação disciplinar independentemente da reabilitação criminal, em razão da independência das instâncias.", "D": "O pedido de reabilitação deve ser dirigido ao Conselho Federal da OAB."}, fb:{"A": "Incorreta. O prazo de 1 ano foi cumprido, mas não é o único requisito. Quando a sanção disciplinar decorreu de condenação criminal pelos mesmos fatos, a reabilitação disciplinar TAMBÉM depende da reabilitação criminal (art. 41 EOAB). A execução penal ainda está em curso = sem reabilitação criminal ainda = sem reabilitação disciplinar.", "B": "Correta! Art. 41 EOAB: reabilitação após 1 ano do cumprimento da sanção + bom comportamento. EXCEÇÃO: quando a infração decorreu de condenação criminal, também é necessária a reabilitação criminal. Daniel: pena disciplinar cumprida (1 ano ok) + pena criminal em execução = sem reabilitação criminal = sem reabilitação disciplinar ainda.", "C": "Incorreta. As instâncias são independentes para fins de responsabilização, mas o Estatuto cria essa exceção expressa para a reabilitação: se houve condenação criminal, a reabilitação disciplinar depende da criminal.", "D": "Incorreta. O pedido de reabilitação é dirigido ao CONSELHO SECCIONAL competente — não ao Conselho Federal."}, fund:"Art. 41 EOAB: reabilitação disciplinar = 1 ano após cumprimento da sanção + bom comportamento. Exceção: se a infração decorreu de crime, também exige reabilitação criminal. Competência para o pedido: Conselho Seccional (não Federal).", caqui:"As instâncias são independentes para punir — mas a reabilitação tem uma exceção importante. Pensa assim: Daniel foi punido tanto na OAB quanto na justiça criminal pelos mesmos fatos (assédio). A OAB disse: 'se você foi condenado criminalmente também, só pode se reabilitar na OAB depois de se reabilitar também na esfera criminal.' Faz sentido: se a execução penal ainda corre, ele ainda não 'pagou o preço' integralmente. A FGV adora cobrar onde se pede a reabilitação: SECCIONAL, não Federal."},
  {num:9, exame:"XXXVIII Exame — 2023", titulo:"Suspensão Preventiva — Requisitos e Prazo de 90 Dias", enunciado:"Marcelo, advogado, é acusado de utilizar atestado médico falso para obter a soltura de seu cliente. O fato ganhou grande repercussão, e um jornal local publicou notícia afirmando que Marcelo deveria ser suspenso preventivamente pela OAB até o término da apuração disciplinar.", comando:"Sobre o tema, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Cabe ao Tribunal de Ética e Disciplina do Conselho Seccional perante o qual a infração tenha ocorrido suspendê-lo preventivamente.", "B": "A suspensão preventiva pressupõe a demonstração de que o fato tenha gerado repercussão prejudicial à dignidade da advocacia.", "C": "Antes da aplicação da suspensão preventiva, o acusado deve ser ouvido em sessão especial, salvo se não for possível notificá-lo para comparecer.", "D": "Caso aplicada a suspensão preventiva, o processo disciplinar deve ser concluído no prazo máximo de 60 dias."}, fb:{"A": "Incorreta. A suspensão preventiva é de competência do Tribunal de Ética e Disciplina do Conselho Seccional onde o advogado possui INSCRIÇÃO PRINCIPAL — não necessariamente onde a infração ocorreu. Um advogado pode praticar infração em outro Estado, mas a suspensão preventiva cabe ao Seccional de sua inscrição.", "B": "Correta! Art. 70, §3º EOAB: a suspensão preventiva é medida excepcional que pressupõe repercussão prejudicial à dignidade da advocacia. Não basta a gravidade abstrata da conduta — é necessária a demonstração dessa repercussão específica.", "C": "Incorreta. O advogado deve ser ouvido em sessão especial SALVO SE, REGULARMENTE NOTIFICADO, não comparecer. A dispensa da oitiva não decorre da impossibilidade de notificação, mas da contumácia (não comparecimento após notificação regular).", "D": "Incorreta. O prazo para conclusão do processo disciplinar após aplicação de suspensão preventiva é de 90 DIAS — não 60 dias. A FGV trocou o prazo propositalmente."}, fund:"Art. 70, §3º EOAB: suspensão preventiva = repercussão prejudicial à dignidade da advocacia + oitiva do advogado em sessão especial (salvo não comparecimento após regular notificação). Prazo de conclusão do processo: 90 dias. Competência: Seccional da inscrição principal.", caqui:"Três detalhes que a FGV sempre troca na suspensão preventiva: (1) COMPETÊNCIA = onde o advogado tem inscrição principal (não onde ocorreu a infração). (2) DISPENSA DA OITIVA = quando notificado regularmente e não comparece (não 'quando não é possível notificar'). (3) PRAZO = 90 DIAS para concluir o processo (não 60). Mnemônico: 'Preventiva = 90 dias, dignidade prejudicada, seccional da inscrição.'"},
  {num:10, exame:"XXXVIII Exame — 2023", titulo:"Busca e Apreensão em Escritório — Cadeia de Custódia e Vedação à Colaboração", enunciado:"Foi deferida medida cautelar de busca e apreensão no escritório do advogado José, diante de indícios de autoria e materialidade da prática de crime por ele, juntamente com seu cliente Oswaldo.", comando:"Sobre essa situação, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "É dever do representante da OAB impedir a retirada de documentos relativos a outros processos de Oswaldo, não relacionados à investigação, exceto se o volume ou a natureza dos objetos impedirem o resguardo do sigilo por meio da cadeia de custódia.", "B": "A análise dos documentos apreendidos depende de comunicação prévia ao Conselho Federal da OAB com antecedência mínima de 48 horas.", "C": "Caso seja essencial à sua defesa, José poderá celebrar colaboração premiada contra Oswaldo.", "D": "José tem direito de estar presente na ocasião designada para a análise do conteúdo dos documentos apreendidos."}, fb:{"A": "Correta! Art. 7º, §6º EOAB: o representante da OAB deve zelar para que não sejam apreendidos documentos, mídias e objetos relativos a outros processos estranhos à investigação. EXCEÇÃO: se o volume ou a natureza dos objetos impossibilitar a separação imediata no local, utiliza-se a CADEIA DE CUSTÓDIA para preservar o sigilo até a análise posterior — e analisa-se apenas o material relacionado à investigação.", "B": "Incorreta. A lei não exige comunicação prévia ao Conselho FEDERAL com 48h de antecedência. Exige-se a presença do representante da OAB (Seccional) na diligência, com comunicação ao presidente do Conselho Seccional.", "C": "Incorreta. Art. 7º, §6º-I EOAB (Lei 14.365/2022): vedada colaboração premiada contra quem seja ou tenha sido cliente. Oswaldo é cliente de José = colaboração vedada, mesmo que seja 'essencial à defesa'.", "D": "Incorreta. A lei assegura a presença do REPRESENTANTE DA OAB na diligência e na análise — não necessariamente do advogado investigado na análise posterior dos documentos apreendidos."}, fund:"Art. 7º, §6º EOAB: busca e apreensão em escritório. Representante da OAB protege sigilo dos demais clientes. Exceção da cadeia de custódia: quando separação imediata for impossível. Art. 7º, §6º-I: vedada colaboração premiada contra cliente (mesmo que seja para defesa própria do advogado).", caqui:"Dois institutos distintos nessa questão: (1) BUSCA E APREENSÃO = representante da OAB protege os arquivos dos outros clientes. Se for impossível separar na hora (muito material), usa a cadeia de custódia e depois filtra só o que interessa à investigação. (2) COLABORAÇÃO PREMIADA = mesmo que José esteja sendo investigado e precisasse de uma saída, ele NÃO pode colaborar contra Oswaldo (seu cliente). A vedação do art. 7º §6º-I é absoluta — inclusive quando é 'essencial à própria defesa'."},
  {num:11, exame:"XXXVII Exame — 2023", titulo:"Deturpar Julgado para Iludir o Juiz — Censura Conversível em Advertência", enunciado:"Laura, advogada regularmente inscrita na OAB, atua na defesa de Amanda em processo criminal. Convicta da inocência da cliente, Laura elaborou recurso em que transcreveu seletivamente trechos de julgados dos tribunais superiores, deturpando seu conteúdo para iludir o juiz da causa. Foi instaurado processo disciplinar. Laura não é reincidente, nunca sofreu punição disciplinar e não há circunstâncias agravantes.", comando:"Nessas circunstâncias, Laura estará sujeita a:", gabarito:"B", alt:{"A": "Interdição do exercício profissional, em todo o território nacional, pelo prazo de 30 dias a 12 meses.", "B": "Censura, podendo ser convertida em advertência, em ofício reservado e sem registro nos assentamentos.", "C": "Multa variável entre uma anuidade e seis anuidades.", "D": "Impedimento de exercer o mandato profissional."}, fb:{"A": "Incorreta. A sanção para o art. 34, XIV EOAB não é suspensão (interdição do exercício profissional). A 'interdição em todo o território nacional' tampouco é sanção prevista no EOAB nesses termos.", "B": "Correta! Art. 34, XIV EOAB: deturpar o teor de julgado para iludir o juiz da causa = infração disciplinar. Art. 36 EOAB: pena = CENSURA. Art. 36, §único: ausência de punição anterior é atenuante → censura pode ser convertida em ADVERTÊNCIA, em ofício reservado e SEM REGISTRO nos assentamentos.", "C": "Incorreta. Multa não é sanção disciplinar autônoma para essa infração no sistema do EOAB. O EOAB prevê multa como sanção acessória ou específica em outros contextos, mas não para essa infração.", "D": "Incorreta. 'Impedimento de exercer o mandato profissional' não é sanção disciplinar prevista no EOAB. O Estatuto prevê: censura, suspensão, exclusão e multa (art. 37)."}, fund:"Art. 34, XIV EOAB: deturpar lei/doutrina/julgado para confundir adversário ou iludir juiz = infração. Art. 36 EOAB: pena = censura. Art. 36, §único EOAB: com atenuante (ausência de punição anterior, entre outros) = censura convertida em advertência (ofício reservado, sem registro nos assentamentos).", caqui:"Deturpar julgado = censura. Com atenuante (aqui: sem punição anterior) = pode virar advertência. Diferença entre censura e advertência que a FGV adora cobrar: CENSURA = registrada nos assentamentos do advogado (fica no histórico). ADVERTÊNCIA = ofício reservado + sem registro. Na prática, a advertência é como um 'aviso sigiloso' — o advogado fica sabendo mas não fica marcado no histórico oficial. Laura tem todos os requisitos para pedir a conversão: primária, sem agravantes."},
  {num:12, exame:"XXXVII Exame — 2023", titulo:"Notificações no Processo Disciplinar — Presunção de Recebimento no Endereço Cadastrado", enunciado:"Foi instaurado processo disciplinar em face do advogado Nino.", comando:"Sobre as notificações no processo disciplinar da OAB, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "A notificação inicial para apresentação de defesa prévia deve ser feita pessoalmente, preferencialmente, admitindo-se carta com AR apenas em situações excepcionais.", "B": "Se a notificação inicial ocorrer por edital, deve constar apenas o nome do advogado, seu número de inscrição e a informação de que se destina à apresentação de defesa prévia.", "C": "As notificações por edital, exceto a inicial, devem indicar o nome do advogado e de seu defensor constituído.", "D": "Presume-se recebida a notificação enviada por correspondência com aviso de recebimento para o endereço residencial ou profissional constante do cadastro do advogado na OAB."}, fb:{"A": "Incorreta. O EOAB e o Regulamento Geral não estabelecem a notificação pessoal como forma preferencial. A correspondência ao endereço cadastrado é a forma ordinária, e a presunção de recebimento opera sobre ela.", "B": "Incorreta. O edital de notificação deve observar os requisitos do Regulamento Geral da OAB — que são mais completos do que os descritos na alternativa, não se limitando a nome, inscrição e finalidade.", "C": "Incorreta. Não existe exigência legal de que as notificações por edital indiquem o nome do defensor constituído. A alternativa criou um requisito inexistente.", "D": "Correta! O Estatuto e o Regulamento Geral da OAB estabelecem que se presume recebida a notificação enviada ao endereço residencial ou profissional constante do cadastro do advogado na OAB. Cabe ao advogado manter seus dados atualizados."}, fund:"EOAB e Regulamento Geral OAB: presume-se recebida a notificação enviada ao endereço cadastrado do advogado. O dever de manter o cadastro atualizado é do próprio advogado. Consequência: notificação enviada ao endereço desatualizado, por culpa do advogado, é válida.", caqui:"A OAB notifica pelo endereço que você cadastrou. Se você mudou de endereço e não atualizou na OAB, o problema é seu — a notificação enviada ao endereço antigo é válida e presume-se recebida. É uma responsabilidade do advogado: mantenha o cadastro atualizado. A FGV coloca a notificação pessoal ou exigências específicas de edital para confundir. A regra é simples: endereço cadastrado + carta com AR = presunção de recebimento."},
  {num:13, exame:"XXXIV Exame — 2022", titulo:"Termo de Ajustamento de Conduta (TAC) — Dois Requisitos Cumulativos", enunciado:"O advogado Pedro praticou infração disciplinar punível com censura, a qual gerou grande repercussão negativa para a advocacia, recebendo ampla divulgação na mídia. Já o advogado Hélio praticou infração disciplinar punível com suspensão, mas sem qualquer repercussão pública.", comando:"Considerando a situação narrada, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "É admissível a celebração de termo de ajustamento de conduta tanto por Pedro como por Hélio.", "B": "Não é admissível a celebração de termo de ajustamento de conduta por Pedro nem por Hélio.", "C": "É admissível a celebração de termo de ajustamento de conduta por Pedro, mas não é admissível por Hélio.", "D": "É admissível a celebração de termo de ajustamento de conduta por Hélio, mas não é admissível por Pedro."}, fb:{"A": "Incorreta. Nenhum dos dois preenche os dois requisitos cumulativos do TAC.", "B": "Correta! CED art. 58-A (Res. CFOAB 04/2020): TAC somente é admissível quando DOIS REQUISITOS se somam: (1) infração punível com CENSURA; E (2) fato que NÃO tenha gerado repercussão negativa à advocacia. Pedro: censura ✓, mas repercussão negativa ✗ → sem TAC. Hélio: sem repercussão negativa ✓, mas suspensão ✗ → sem TAC.", "C": "Incorreta. Pedro não pode: embora a infração seja de censura, houve repercussão negativa — o segundo requisito falhou.", "D": "Incorreta. Hélio não pode: embora sem repercussão negativa, a infração é punível com suspensão — o primeiro requisito falhou."}, fund:"CED art. 58-A (Resolução CFOAB nº 04/2020): TAC = infração punível com CENSURA + fato sem repercussão negativa à advocacia. Dois requisitos CUMULATIVOS. A ausência de qualquer um deles impede o TAC.", caqui:"A FGV dividiu os requisitos entre dois personagens exatamente para testar se você sabe que são CUMULATIVOS. Pedro tem um (censura) mas não tem o outro (sem repercussão). Hélio tem um (sem repercussão) mas não tem o outro (suspensão, não censura). Resultado: nenhum dos dois faz TAC. Mnemônico do TAC: 'CeS-NR' = Censura + Sem Repercussão negativa. Os dois juntos = TAC possível. Faltou um? Vai para o processo disciplinar normal."},
  {num:14, exame:"XXXIV Exame — 2022", titulo:"Advogado Suspenso — Pode Impetrar Habeas Corpus", enunciado:"Aline, advogada regularmente inscrita na OAB, está cumprindo sanção disciplinar de suspensão.", comando:"Durante esse período, assinale o ato que ela poderá praticar validamente.", gabarito:"A", alt:{"A": "Impetrar habeas corpus perante o Superior Tribunal de Justiça.", "B": "Visar ato constitutivo de cooperativa para registro.", "C": "Complementar parecer elaborado em consulta jurídica.", "D": "Interpor recurso contra sentença em processo no qual atuava em causa própria."}, fb:{"A": "Correta! O habeas corpus NÃO é ato privativo de advogado. A Constituição Federal (art. 5º, LXVIII) e o CPP (art. 654) permitem que qualquer pessoa — mesmo sem ser advogado — impetre habeas corpus. Aline suspenso pode impetrar HC normalmente.", "B": "Incorreta. Visar atos constitutivos de cooperativas para fins de registro é ato privativo da advocacia (art. 1º, II EOAB). Advogado suspenso não pode praticá-lo.", "C": "Incorreta. Consultoria e assessoria jurídicas são atividades privativas da advocacia (art. 1º, II EOAB). Complementar parecer = atividade privativa = vedada durante a suspensão.", "D": "Incorreta. Mesmo em causa própria, o advogado suspenso NÃO pode exercer a advocacia. Art. 4º EOAB: atos praticados por advogado suspenso são nulos. A 'causa própria' não é exceção durante a suspensão."}, fund:"Art. 1º EOAB: atividades privativas da advocacia (inclui consultoria, representação, visamento de atos). Art. 4º EOAB: atos praticados por suspenso = nulos. CF art. 5º, LXVIII e CPP art. 654: habeas corpus pode ser impetrado por qualquer pessoa, sem necessidade de ser advogado.", caqui:"A pegadinha clássica da FGV é a 'causa própria' — colocar como se o suspenso pudesse advogar para si mesmo. NÃO pode. Suspensão = proibição total de exercer a advocacia, inclusive em causa própria. A única saída legítima é o HC — que qualquer pessoa pode impetrar, sem capacidade postulatória. Portanto, Aline pode impetrar HC não porque é advogada, mas porque qualquer um pode. Mnemônico: 'Suspenso pode HC porque qualquer um pode.'"},
  {num:15, exame:"XXXII Exame — 2021", titulo:"Decisão-Surpresa no Processo Disciplinar — Vedada em Qualquer Grau, Salvo Urgência", enunciado:"O advogado Gerson responde a processo disciplinar perante a OAB. No curso do processo, o órgão julgador apreciou, de ofício, determinada matéria processual sem oportunizar manifestação da defesa.", comando:"Considerando a situação, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Em grau recursal, é vedada decisão baseada em fundamento sobre o qual não houve manifestação da defesa, salvo medidas de urgência. Em primeiro grau, tratando-se de matéria de ordem pública ou de medidas de urgência, dispensa-se a manifestação prévia.", "B": "Em qualquer grau de julgamento, é vedada decisão baseada em fundamento sobre o qual não tenha sido dada oportunidade de manifestação à defesa, ainda que se trate de matéria decidível de ofício, ressalvadas as medidas de urgência previstas na Lei nº 8.906/94.", "C": "Em grau recursal, a vedação alcança inclusive as medidas de urgência. Em primeiro grau, tratando-se de matéria de ordem pública ou medidas de urgência, dispensa-se a manifestação.", "D": "Em qualquer grau de julgamento, é vedada decisão baseada em fundamento sobre o qual não tenha sido dada oportunidade de manifestação, inclusive nas medidas de urgência."}, fb:{"A": "Incorreta. A distinção entre 1º grau e recursal não existe — a regra vale em QUALQUER GRAU. E no 1º grau, matéria de ordem pública também exige prévia manifestação da parte (exceção apenas para urgência).", "B": "Correta! Lei 14.365/2022 + art. 10 CPC (aplicado ao processo disciplinar): vedada a decisão-surpresa em QUALQUER grau de julgamento, MESMO que a matéria possa ser conhecida de ofício. Única exceção: MEDIDAS DE URGÊNCIA previstas no EOAB.", "C": "Incorreta. As medidas de urgência são exatamente a EXCEÇÃO à vedação da decisão-surpresa — não são proibidas, são permitidas. A alternativa inverteu a lógica.", "D": "Incorreta. Inclusão das medidas de urgência na vedação = errada. A exceção legal são justamente as medidas de urgência, que dispensam o contraditório prévio."}, fund:"Lei 14.365/2022 + art. 10 CPC: vedação à decisão-surpresa no processo disciplinar da OAB. Regra: qualquer matéria, mesmo de ofício, exige prévia manifestação da parte. Exceção: medidas de urgência previstas no EOAB. Vale em qualquer grau de julgamento.", caqui:"Decisão-surpresa = decidir sobre algo sem dar chance de a parte falar primeiro. Mesmo que seja matéria que o órgão pode conhecer de ofício (nulidade, por exemplo), ele precisa avisar a parte e dar prazo para falar. É como o árbitro mostrar o cartão vermelho sem explicar por quê — a parte tem direito de saber antes. Exceção: urgência. A distinção correta não é entre 1º e 2º grau — é entre situações normais (prévia manifestação obrigatória) e urgência (pode decidir depois explica)."},
  {num:16, exame:"XXX Exame — 2019", titulo:"Sigilo Profissional — Autorização do Cliente e Defesa da Honra do Advogado", enunciado:"Antônio, após o encerramento de um processo, desejou utilizar fatos da vida pessoal de seu cliente em sua dissertação de mestrado. Antes disso, consultou o cliente, que autorizou expressamente a divulgação. José, por sua vez, foi gravemente difamado em público por uma das partes do processo e, para defender sua honra, revelou fatos sigilosos dos quais teve conhecimento no exercício da advocacia.", comando:"Considerando os dois casos, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Antônio violou o sigilo profissional. José não praticou infração ética.", "B": "Antônio e José violaram o sigilo profissional.", "C": "José violou o sigilo profissional. Antônio não praticou infração ética.", "D": "Antônio e José não cometeram infração ética, pois o dever de sigilo cede em ambas as situações."}, fb:{"A": "Incorreta. Antônio também não violou o sigilo — havia autorização expressa do cliente. A alternativa erra ao dizer que Antônio violou.", "B": "Incorreta. Nenhum dos dois violou o sigilo: Antônio tinha autorização e José tinha justa causa (defesa da honra).", "C": "Incorreta. José agiu amparado por exceção legal — revelou apenas o necessário para sua defesa pessoal. Não praticou infração.", "D": "Correta! CED art. 37: o sigilo profissional cede em duas hipóteses aqui: (1) ANTÔNIO: autorização expressa do cliente → sigilo cede, divulgação lícita. (2) JOSÉ: gravemente difamado pelo adversário → pode revelar fatos sigilosos para defender sua honra (justa causa), revelando apenas o indispensável."}, fund:"CED art. 37: o sigilo profissional não é absoluto. Cede com autorização do cliente (caso Antônio). Cede para defesa do próprio advogado quando afrontado pelo cliente ou pelo adversário (caso José). Revelação deve ser restrita ao estritamente necessário.", caqui:"O sigilo profissional é robusto mas não absoluto. Duas exceções aqui: AUTORIZAÇÃO DO CLIENTE = titular do segredo libera = pode divulgar. DEFESA DA HONRA DO ADVOGADO = quando ele é difamado, pode revelar o necessário para se defender. A FGV adora a alternativa C (José violou, Antônio não) para quem conhece a exceção da autorização mas não conhece a exceção da defesa da honra. Ambas são exceções legítimas ao dever de sigilo."},
  {num:17, exame:"XXIX Exame — 2019", titulo:"Negar Informações e Reter Bens do Cliente — Ambas São Infrações Éticas", enunciado:"Milton, advogado, atuou regularmente na defesa de Tomás, mas o cliente deixou de pagar os honorários contratados. Em 08/04/2019, Tomás pediu esclarecimentos sobre o andamento e aspectos do processo. Milton recusou-se a prestar qualquer informação enquanto não recebesse os honorários. Em 10/05/2019, Tomás solicitou a devolução de bens móveis que havia confiado ao advogado durante o processo. Milton recusou-se a devolvê-los, afirmando que pretendia vendê-los para compensar os honorários devidos.", comando:"Assinale a alternativa correta.", gabarito:"B", alt:{"A": "Apenas a conduta de 08/04/2019 configura infração ética.", "B": "Ambas as condutas configuram infrações éticas.", "C": "Nenhuma das condutas configura infração ética.", "D": "Apenas a conduta de 10/05/2019 configura infração ética."}, fb:{"A": "Incorreta. A retenção e tentativa de alienação dos bens do cliente TAMBÉM configura infração ética. Ambas as condutas são vedadas.", "B": "Correta! CONDUTA 1 (negar informações): o advogado tem dever permanente de informar o cliente sobre o andamento do processo. Honorários não pagos NÃO autorizam a retenção de informações. CONDUTA 2 (reter e pretender vender bens): o advogado não pode reter nem alienar bens do cliente para compensar honorários. A cobrança deve ser pelos meios legais (ação de cobrança), nunca por autotutela.", "C": "Incorreta. As duas condutas violam deveres éticos expressos no CED.", "D": "Incorreta. Negar informações ao cliente também é infração — o dever de prestar esclarecimentos persiste mesmo diante da inadimplência."}, fund:"CED: dever do advogado de informar o cliente sobre o andamento do processo. Vedação de retenção de bens do cliente para compensar honorários. A inadimplência do cliente deve ser resolvida pelos meios legais (ação de cobrança, execução do contrato), não por autotutela do advogado.", caqui:"Honorários não pagos = cobrança pela via legal. Ponto. O advogado não pode: (1) negar informações como 'punição' pela inadimplência; (2) segurar ou vender bens do cliente como garantia. Ambas são formas de autotutela vedadas pela ética. É como um médico que recusa revelar o diagnóstico porque o paciente não pagou a consulta — eticamente inaceitável. A FGV adora colocar as duas condutas para ver se o candidato acha que só uma delas é infração."},
  {num:18, exame:"XXVIII Exame — 2019", titulo:"Três Suspensões Sem Reabilitação — Exclusão com Quórum de 2/3", enunciado:"Gabriel, advogado, sofreu pena de suspensão em razão da prática das seguintes infrações disciplinares: atuar com o cliente para fraudar a lei; recusar-se a prestar contas ao cliente; incidir em erros reiterados que evidenciaram inépcia profissional. Antes de transcorrido o prazo para requerer a reabilitação e após o trânsito em julgado das decisões administrativas, foi instaurado novo processo disciplinar em razão dessas punições anteriores.", comando:"Assinale a penalidade aplicável.", gabarito:"C", alt:{"A": "Exclusão, dependendo de manifestação da maioria absoluta do Conselho Seccional.", "B": "Suspensão, com cancelamento da inscrição na OAB.", "C": "Exclusão, ficando eventual nova inscrição condicionada à prova de reabilitação.", "D": "Suspensão de 12 a 30 meses."}, fb:{"A": "Incorreta. A exclusão é a penalidade correta, mas o quórum está errado. Não é maioria absoluta — é 2/3 dos membros do Conselho Seccional (art. 38, §único EOAB).", "B": "Incorreta. Não é suspensão — é EXCLUSÃO. E a suspensão não cancela a inscrição; quem cancela a inscrição é a exclusão.", "C": "Correta! Art. 38, I EOAB: a exclusão será aplicada ao advogado que sofrer três suspensões, cujas decisões tenham transitado em julgado, sem que haja ocorrido reabilitação. Gabriel tem três suspensões definitivas sem reabilitação = EXCLUSÃO. E eventual nova inscrição depende de prova de reabilitação (art. 11 EOAB).", "D": "Incorreta. Nova suspensão não é a sanção cabível para quem já acumulou três suspensões sem reabilitação. A lei prevê expressamente a exclusão nesse caso."}, fund:"Art. 38, I EOAB: três suspensões transitadas em julgado sem reabilitação = exclusão. Art. 38, §único: quórum de 2/3 dos membros do Conselho Seccional. Art. 11 EOAB: nova inscrição após exclusão = prova de reabilitação + demais requisitos.", caqui:"A regra das três suspensões: 1ª suspensão, 2ª suspensão, 3ª suspensão (sem reabilitação entre elas) = EXCLUSÃO. A FGV colocou a alt A com 'maioria absoluta' em vez de '2/3' — detalhe que derruba candidatos que lembram da exclusão mas erram o quórum. E a alt B coloca 'suspensão com cancelamento de inscrição' misturando dois institutos que não andam juntos. Mnemônico: '3 suspensões = Exclusão com 2/3 do Seccional.'"},
  {num:19, exame:"XXVIII Exame — 2019", titulo:"Publicidade Profissional — QR Code Permitido; Fotografia do Escritório Vedada", enunciado:"A advogada Leia Santos confeccionou cartões de visita contendo: nome, número de inscrição na OAB, site do escritório e QR Code direcionando o cliente para informações sobre o escritório. O advogado Lucas Souza confeccionou cartões contendo: nome, número de inscrição na OAB, logotipo discreto e fotografia do escritório.", comando:"Considerando o Código de Ética e Disciplina da OAB, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Leia e Lucas cometeram infrações éticas.", "B": "Nenhum dos dois cometeu infração ética.", "C": "Apenas Leia cometeu infração ética.", "D": "Apenas Lucas cometeu infração ética."}, fb:{"A": "Incorreta. Leia não cometeu infração — todos os elementos do seu cartão são permitidos pelo CED.", "B": "Incorreta. Lucas usou elemento vedado: fotografia do escritório.", "C": "Incorreta. Quem cometeu infração foi Lucas, não Leia.", "D": "Correta! CED sobre publicidade: PERMITIDOS nos cartões = nome, número OAB, endereço, telefone, e-mail, site, QR Code (como meio de acesso a informações), logotipo discreto. VEDADOS = fotografia do escritório (caracteriza publicidade incompatível com a sobriedade exigida na advocacia). Leia: tudo permitido. Lucas: logotipo discreto (ok) + fotografia do escritório (VEDADA) = infração."}, fund:"CED OAB: publicidade profissional deve ser informativa, sóbria e sem mercantilismo. Permitidos nos cartões: nome, inscrição OAB, endereço, contatos, site, QR Code, logotipo discreto. Vedados: fotografias do escritório, slogans mercantilistas, autopromoção exagerada, serviços específicos.", caqui:"A FGV divide os elementos certos e errados entre dois personagens. Leia tem elementos modernos mas permitidos: site (identificação) + QR Code (acesso às informações = equivalente ao endereço digital). Lucas tem uma armadilha: logotipo discreto é ok, mas fotografia do escritório NÃO pode — é publicidade visual incompatível com a sobriedade exigida. Pensa: site te mostra onde encontrar o escritório. Foto do escritório é marketing visual = vedado. QR Code = apenas atalho para as informações = permitido."},
  {num:20, exame:"XXVI Exame — 2018", titulo:"Reabilitação Disciplinar — Prazo de 1 Ano e Exceção por Condenação Criminal", enunciado:"Júlio sofreu pena de censura por infração disciplinar não decorrente de crime. Tatiana sofreu pena de suspensão por infração disciplinar não decorrente de crime. Rodrigo sofreu pena de suspensão por infração disciplinar decorrente da prática de crime, pelo qual também foi condenado criminalmente. Após um ano do cumprimento das sanções, todos pretendem obter reabilitação disciplinar, apresentando provas de bom comportamento.", comando:"Assinale a alternativa correta.", gabarito:"A", alt:{"A": "Júlio e Tatiana fazem jus à reabilitação. Rodrigo depende também da reabilitação criminal.", "B": "Apenas Júlio faz jus à reabilitação.", "C": "Todos fazem jus à reabilitação, independentemente da reabilitação criminal.", "D": "Ninguém faz jus à reabilitação."}, fb:{"A": "Correta! Art. 41 EOAB: reabilitação após 1 ano do cumprimento da sanção + bom comportamento — vale para QUALQUER sanção (censura, suspensão, exclusão). EXCEÇÃO: se a infração decorreu de condenação criminal, também é necessária a reabilitação criminal. JÚLIO (censura, sem crime): cumpriu 1 ano + bom comportamento = reabilitado. TATIANA (suspensão, sem crime): cumpriu 1 ano + bom comportamento = reabilitada. RODRIGO (suspensão por crime): ainda precisa de reabilitação criminal — não basta o prazo disciplinar.", "B": "Incorreta. A reabilitação não é exclusiva para quem recebeu censura. Tatiana (suspensão) também faz jus após 1 ano, pois sua infração não decorreu de crime.", "C": "Incorreta. Rodrigo não pode ser reabilitado disciplinarmente antes de obter a reabilitação criminal — isso é expressa exceção do art. 41 EOAB.", "D": "Incorreta. Júlio e Tatiana preenchem todos os requisitos legais para a reabilitação."}, fund:"Art. 41 EOAB: reabilitação disciplinar = 1 ano após cumprimento da sanção + bom comportamento. Vale para censura, suspensão e exclusão. Exceção: se a infração decorreu de crime, exige também a reabilitação criminal. A reabilitação é requerida ao Conselho Seccional competente.", caqui:"Três advogados, três situações: SEM CRIME (Júlio e Tatiana): 1 ano + bom comportamento = reabilitados. COM CRIME (Rodrigo): 1 ano + bom comportamento + reabilitação criminal = reabilitado. A FGV separou censura (Júlio) de suspensão (Tatiana) para ver se o candidato acha que só a censura permite reabilitação. Errado — qualquer sanção pode ser reabilitada após 1 ano. A diferença real é apenas se houve crime: aí precisa das duas reabilitações."},
];
let cur=0,N=QUESTOES.length;const E=Array(N).fill(null);
function init(){const nw=document.getElementById('nw'),ct=document.getElementById('ct');QUESTOES.forEach((q,i)=>{const b=document.createElement('button');b.className='nb'+(i===0?' active':'');b.textContent=i+1;b.onclick=()=>go(i);b.id='n'+i;nw.appendChild(b);const d=document.createElement('div');d.className='qc'+(i===0?' vis':'');d.id='c'+i;d.innerHTML=bc(q,i);ct.appendChild(d);});upd();us();}
function bc(q,i){const al=Object.entries(q.alt).map(([l,t])=>`<button class="ab" onclick="resp(${i},'${l}',this)" data-l="${l}"><span class="all">${l}</span><span class="alt">${t}</span></button>`).join('');return `<div class="qh"><span class="qn">Questão ${q.num}</span>${q.exame?`<span class="qe">${q.exame}</span>`:''}</div><h2 class="qt">${q.titulo}</h2><div class="en">${q.enunciado}</div><p class="co">${q.comando}</p><div class="al" id="a${i}">${al}</div><div class="fb" id="f${i}"></div><div class="fu" id="u${i}"><h4>📖 Fundamento legal</h4>${q.fund}</div><div class="cx" id="x${i}"><h4>🍊 Explicação do Prof. Caqui</h4>${q.caqui}</div><div class="ca"><div class="bg"><button class="btn az" id="bu${i}" onclick="tF(${i})">Ver fundamento legal</button><button class="btn cq" id="bx${i}" onclick="tX(${i})">Explicação do Prof. Caqui</button><button class="btn" id="br${i}" onclick="rst(${i})">↺ Tentar novamente</button></div><span class="st" id="s${i}"></span></div>`;}
function resp(i,l,btn){if(E[i]!==null)return;E[i]=l;const q=QUESTOES[i];document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=true;if(b.dataset.l===q.gabarito)b.classList.add('cor');if(b.dataset.l===l&&l!==q.gabarito)b.classList.add('err');});const ok=l===q.gabarito,f=document.getElementById('f'+i);f.className='fb sh '+(ok?'ac':'er');f.innerHTML=`<strong>${ok?'✓ Correta!':'✗ Incorreta.'}</strong> ${q.fb[l]}`;document.getElementById('s'+i).textContent=ok?'Acerto!':'Gabarito: '+q.gabarito;document.getElementById('br'+i).className='btn sh';document.getElementById('bu'+i).className='btn az sh';document.getElementById('bx'+i).className='btn cq sh';const nb=document.getElementById('n'+i);nb.classList.remove('active');nb.classList.add(ok?'ok':'no');if(i===cur)nb.classList.add('active');us();}
function tF(i){const b=document.getElementById('u'+i),t=document.getElementById('bu'+i),v=b.classList.contains('sh');b.className=v?'fu':'fu sh';t.textContent=v?'Ver fundamento legal':'Ocultar fundamento';}
function tX(i){const b=document.getElementById('x'+i),t=document.getElementById('bx'+i),v=b.classList.contains('sh');b.className=v?'cx':'cx sh';t.textContent=v?'Explicação do Prof. Caqui':'Ocultar explicação';}
function rst(i){E[i]=null;document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=false;b.className='ab';});document.getElementById('f'+i).className='fb';document.getElementById('u'+i).className='fu';document.getElementById('bu'+i).className='btn az';document.getElementById('bu'+i).textContent='Ver fundamento legal';document.getElementById('x'+i).className='cx';document.getElementById('bx'+i).className='btn cq';document.getElementById('bx'+i).textContent='Explicação do Prof. Caqui';document.getElementById('br'+i).className='btn';document.getElementById('s'+i).textContent='';document.getElementById('n'+i).className='nb'+(i===cur?' active':'');us();}
function go(i){document.getElementById('c'+cur).classList.remove('vis');document.getElementById('n'+cur).classList.remove('active');cur=i;document.getElementById('c'+cur).classList.add('vis');document.getElementById('n'+cur).classList.add('active');upd();window.scrollTo({top:0,behavior:'smooth'});}
function nav(d){const n=cur+d;if(n>=0&&n<N)go(n);}
function upd(){document.getElementById('pi').textContent=(cur+1)+' de '+N;document.getElementById('bp').disabled=cur===0;document.getElementById('bn').disabled=cur===N-1;}
function us(){const r=E.filter(e=>e!==null).length,a=E.filter((e,i)=>e===QUESTOES[i].gabarito).length;document.getElementById('sc-t').textContent=r;document.getElementById('sc-a').textContent=a;document.getElementById('sc-e').textContent=r-a;const p=Math.round((r/N)*100);document.getElementById('pf').style.width=p+'%';document.getElementById('pl').textContent=r+' de '+N+' respondidas';}
init();
</script>
